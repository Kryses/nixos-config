# ============================================
# Tmux Configuration
# ============================================

# Change prefix from Ctrl+b to Ctrl+a (more ergonomic)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================
# General Settings
# ============================================

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Faster command sequences (no delay after escape)
set -sg escape-time 0

# ============================================
# Keybindings
# ============================================

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easy window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Copy mode with vim keybindings
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
bind p paste-buffer

# Quick pane selection
bind -r Space select-pane -t :.+

# Break pane into new window
bind b break-pane -d

# Join pane from window
bind j command-prompt -p "join pane from:" "join-pane -s '%%'"

# Toggle status bar
bind S set-option -g status

# ============================================
# Status Bar Configuration
# ============================================

# Status bar position
set -g status-position bottom
set -g status-justify left

# Status bar colors
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'

# Left status bar
set -g status-left-length 30
set -g status-left '#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7]'

# Right status bar
set -g status-right-length 50
set -g status-right '#[fg=#565f89]#[fg=#a9b1d6,bg=#565f89] %Y-%m-%d #[fg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M '

# Window status format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'bg=#7aa2f7 fg=#1a1b26 bold'

# ============================================
# Additional Features
# ============================================

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Automatic renaming
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# ============================================
# Plugins (if using TPM)
# ============================================
# To use plugins, install TPM:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
#
# Initialize TMUX plugin manager (keep this line at the very bottom)
# run '~/.tmux/plugins/tpm/tpm'
