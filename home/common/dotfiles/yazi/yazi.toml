[manager]
layout = [1, 4, 4]
linemode = "none"
show_hidden = true
show_symlink = true
sort_by = "natural"
sort_dir_first = true
sort_reverse = false
sort_sensitive = true


[preview]
cache_dir = ""
image_filter = "lanczos3"
image_quality = 90
max_height = 900
max_width = 600
tab_size = 1
ueberzug_offset = [0, 0, 0, 0]
ueberzug_scale = 1

[tasks]
bizarre_retry = 5
macro_workers = 10
micro_workers = 5

[opener]
image_open = [{ run = 'imv "$@"', orphan = true, for = "unix" }]
image_edit = [{ run = 'gimp "$@"', orphan = true, for = "unix" }]
video_open = [{ run = 'mpv "$@"', orphan = true, for = "unix" }]

[open]
prepend_rules = [
  { mime = "image/*", use = [
    "image_open",
    "image_edit",
  ] },
  { mime = "video/*", use = "video_open" },
]
